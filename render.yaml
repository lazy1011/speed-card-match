services:
  - type: web
    name: speed-card-backend
    env: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: node backend/dist/server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://frontend-epwl7yo92-lazy1011s-projects.vercel.app
